server {
    listen 80;
    server_name _;

    # API requests are proxied to the backend service on the compose network.
    # Relative /api/... URLs from the frontend therefore work same-origin.
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Voice assessment (Whisper + multi-agent LLM calls) can take a while.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 25m;
    }

    # Agentic service (Phase 1). Long timeouts: agent runs can take many seconds.
    location /agent/ {
        proxy_pass http://agent-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA: serve static assets, fall back to index.html for client-side routing.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

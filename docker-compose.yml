# CogniScan local stack.
#   Core (mongo + backend + frontend):  docker compose up -d --build
#   With ML service (heavy, Phase 2):   docker compose --profile ml up -d --build
#
# Frontend (nginx) is the entry point on http://localhost:5173 and proxies
# /api to the backend. The backend API is also exposed directly on :5000.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
      - agent-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-3f9a2c7e1b8d4f6a0c5e9d2b7a1f4c8e}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      MONGO_URI: mongodb://mongo:27017/dementiaDB
      PORT: 5000
      ML_SERVICE_URL: http://ml-service:8000
      AGENT_SERVICE_URL: http://agent-service:8000
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    ports:
      - "5000:5000"

  agent-service:
    build: ./agent-service
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      # Default Groq model for the reasoning/conductor agents (needs tool calling).
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      MODEL_REASONING: ${MODEL_REASONING:-llama-3.3-70b-versatile}
      MODEL_CONDUCTOR: ${MODEL_CONDUCTOR:-llama-3.3-70b-versatile}
      MODEL_FAST: ${MODEL_FAST:-llama-3.1-8b-instant}
      ML_SERVICE_URL: http://ml-service:8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    ports:
      - "8080:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
      - agent-service
    ports:
      - "5173:80"

  ml-service:
    build: ./ml-service
    restart: unless-stopped
    profiles: ["ml"]
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    # Host 8001 -> container 8000 (host :8000 is used by another local project).
    # The backend reaches this service in-network at http://ml-service:8000.
    ports:
      - "8001:8000"

volumes:
  mongo-data:
